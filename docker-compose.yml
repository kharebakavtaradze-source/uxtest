version: '3.9'

services:
  app:
    build: .
    ports:
      - "3001:3001"
    volumes:
      # Persist uploaded images and database between restarts
      - uxtest_uploads:/app/backend/uploads
      - uxtest_data:/app/backend
    environment:
      - PORT=3001
      - NODE_ENV=production
    restart: unless-stopped

volumes:
  uxtest_uploads:
  uxtest_data:
